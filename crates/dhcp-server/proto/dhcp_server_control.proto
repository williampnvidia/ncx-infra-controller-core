syntax = "proto3";

package dhcp_server_control;

service DhcpServerControl {
    // Update the DHCP config and immediately reload/restart the DHCP server.
    // The server skips the restart if the incoming config is identical to the
    // currently active config.
    rpc UpdateAndReloadConfig(UpdateAndReloadConfigRequest) returns (UpdateAndReloadConfigResponse);

    // Return the last DHCP request timestamp for each known host interface.
    // Used by the agent when the DHCP server runs in a separate container and
    // the timestamps file is not directly accessible on the DPU filesystem.
    rpc GetDhcpTimestamps(GetDhcpTimestampsRequest) returns (GetDhcpTimestampsResponse);

    // Stop the DHCP server without terminating the gRPC control server.
    // The gRPC server remains up to accept future requests.  The DHCP server
    // will be restarted automatically by the next UpdateAndReloadConfig call.
    rpc StopServer(StopServerRequest) returns (StopServerResponse);
}

// ── UpdateAndReloadConfig ─────────────────────────────────────────────────────

// Mirrors utils::models::dhcp::DhcpConfig.
// IPv4 addresses are encoded as dotted-decimal strings (e.g. "192.168.1.1").
message DhcpConfig {
    uint32 lease_time_secs = 1;
    uint32 renewal_time_secs = 2;
    uint32 rebinding_time_secs = 3;
    repeated string carbide_nameservers = 4;
    optional string carbide_api_url = 5;
    repeated string carbide_ntpservers = 6;
    string carbide_provisioning_server_ipv4 = 7;
    string carbide_dhcp_server = 8;
    repeated string carbide_nameservers_v6 = 9;
    repeated string carbide_ntpservers_v6 = 10;
    optional string carbide_dhcp_server_v6 = 11;
    uint32 dhcpv6_preferred_lifetime_secs = 12;
    uint32 dhcpv6_valid_lifetime_secs = 13;
}

// Mirrors utils::models::dhcp::InterfaceInfo.
// IPv4 addresses are encoded as dotted-decimal strings. IPv6 details are
// absent for v4-only hosts.
message InterfaceInfo {
    string address = 1;
    string gateway = 2;
    string prefix = 3;
    string fqdn = 4;
    optional string booturl = 5;
    optional uint32 mtu = 6;
    optional InterfaceInfoV6 ipv6 = 7;
}

message InterfaceInfoV6 {
    // Absent for SLAAC-only entries; present for stateful /128.
    optional string address = 1;
    string prefix = 2;
}

// Mirrors utils::models::dhcp::HostConfig.
// host_interface_id is a UUID string.
message HostConfig {
    string host_interface_id = 1;
    map<string, InterfaceInfo> host_ip_addresses = 2;
}

message UpdateAndReloadConfigRequest {
    DhcpConfig dhcp_config = 1;
    HostConfig host_config = 2;  // absent when not applicable (e.g. Controller mode)
    repeated string interfaces = 3;  // network interfaces for the DHCP server to listen on
}

message UpdateAndReloadConfigResponse {}

// ── GetDhcpTimestamps ─────────────────────────────────────────────────────────

message GetDhcpTimestampsRequest {}

message DhcpTimestampEntry {
    string host_interface_id = 1;  // UUID string of the host's machine interface
    string timestamp = 2;          // RFC 3339 / ISO 8601 timestamp of the last request
}

message GetDhcpTimestampsResponse {
    repeated DhcpTimestampEntry entries = 1;
}

// ── StopServer ────────────────────────────────────────────────────────────────

message StopServerRequest {}

message StopServerResponse {}
