# SFC variables
ENABLE_BR_HBN=yes
ENABLE_BR_SFC=yes
{% if forge_hbn_reps %}
BR_HBN_REPS={{ forge_hbn_reps }}
{% endif %}

{% if forge_hbn_sfs %}
BR_HBN_SFS={{ forge_hbn_sfs }}
{% endif %}

{{ bmc_fw_update }}

# This function is called by install.sh script embedded in the BFB
carbide_modify_os()
{
# set errexit so that if any command fails, we exit the script
set -e
ilog "======== Start of carbide_modify_os ============"
ilog "$(/usr/sbin/fdisk -l)"
ilog "$(/usr/bin/lsblk)"
ilog "$(/usr/sbin/blkid)"
ilog "$(/usr/bin/efibootmgr -v)"
ilog "==================================="
ilog "==================================="
# move the files out of the installer and into the installed OS
mkdir -p /mnt/opt/forge
mv /forge-scout /mnt/opt/forge
chmod a+x /mnt/opt/forge/forge-scout
mv /forge-dpu.deb /mnt/opt/forge
mv /doca_container_configs /mnt/opt/forge
mv /doca_hbn.tar /mnt/opt/forge

#begin nvinit setup
#this step is done in the BFB to ensure that we can always log in to the box, even if cloud-init fails.
mkdir -p /mnt/opt/forge/debs
for deb in /debs/*.deb; do  mv $deb /mnt/opt/forge/debs; done

mkdir -p /mnt/etc/nvssh
chmod 0755 /mnt/etc/nvssh
mv /nvinit_setup/etc-nvssh-nvssh-conf /mnt/etc/nvssh/nvssh.conf
chmod 0644 /mnt/etc/nvssh/nvssh.conf

mv /nvinit_setup/etc-sudoersd-nvssh-sudo /mnt/etc/sudoers.d/nvssh-sudo
chmod 0600 /mnt/etc/sudoers.d/nvssh-sudo
mv /nvinit_setup/etc-sudoersd-nvssh-sudo-nopasswd /mnt/etc/sudoers.d/nvssh-sudo-nopasswd
chmod 0600 /mnt/etc/sudoers.d/nvssh-sudo-nopasswd
mv /nvinit_setup/etc-nsswitch-conf /mnt/etc/nsswitch.conf
chmod 0644 /mnt/etc/nsswitch.conf
mv /nvinit_setup/etc-pamd-sshd /mnt/etc/pam.d/sshd
chmod 0600 /mnt/etc/pam.d/sshd
mv /nvinit_setup/etc-ssh-ngc-users-ca-keys-pem /mnt/etc/ssh/ngc-users-ca-keys.pem
chmod 0644 /mnt/etc/ssh/ngc-users-ca-keys.pem
mv /nvinit_setup/sbin-nss-exec /mnt/sbin/nss_exec
chmod 0755 /mnt/sbin/nss_exec
mv /nvinit_setup/usr-bin-nvssh /mnt/usr/bin/nvssh
chmod 0755 /mnt/usr/bin/nvssh
mv /nvinit_setup/etc-ssh-sshd-config /mnt/etc/ssh/sshd_config
chmod 0644 /mnt/etc/ssh/sshd_config

chroot /mnt chown root:root /etc/sudoers.d/nvssh-sudo
chroot /mnt chown root:root /etc/sudoers.d/nvssh-sudo-nopasswd
chroot /mnt chown root:root /etc/nsswitch.conf
chroot /mnt chown root:root /etc/pam.d/sshd
chroot /mnt chown root:root /etc/ssh/ngc-users-ca-keys.pem
chroot /mnt chown root:root /sbin/nss_exec
chroot /mnt chown root:root /usr/bin/nvssh
chroot /mnt chown root:root /etc/ssh/sshd_config
chroot /mnt chown -R root:root /opt/forge/debs

chroot /mnt groupadd --gid 959 nvssh-sudo-nopasswd
chroot /mnt groupadd --gid 949 nvssh-sudo
chroot /mnt groupadd ngc-automation
chroot /mnt groupadd ngc
chroot /mnt groupadd nsv
chroot /mnt dpkg -R -i /opt/forge/debs

#end nvinit setup

cat << \EOF > /mnt/etc/NetworkManager/conf.d/99-carbide.conf
[main]
dns=systemd-resolved
EOF

cat << \EOF > /mnt/var/lib/cloud/seed/nocloud-net/user-data
#cloud-config
debug:
  verbose: true
timezone: "Etc/UTC"
manage_etc_hosts: true
users:
    # existing user left alone for now until forge user becomes used, then we can remove this entirely.
  - name: ubuntu
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: false
    passwd: $6$QnKhCwOoDCL7WBiY$KgzONMVSjgq/137.pYEwHYQwLLR1CMuqhn2jMOxqhXEni8nQsynh.s6qhdqOWoB5CLhOnM2fjtKuAwf6rm5.6.
    groups: [adm, dialout, cdrom, floppy, sudo, audio, dip, video, plugdev, netdev, lxd]
write_files:
  - path: /opt/forge/run-scout.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      # When updating firmware, HBN is not installed and have no VRF.
      set -e
      CMD_PREFIX="ip vrf exec mgmt"
      count=0
      until $CMD_PREFIX curl -k {{ api_url }}
      do
      echo "api not available yet ($count)";
      if [ $count -ge 60 ]; then exit 1; fi
      sleep 10
      ((count++))
      ${CMD_PREFIX} resolvectl flush-caches
      ${CMD_PREFIX} systemd-resolve --flush-caches
      done
      chmod a+x /opt/forge/forge-scout
      echo "starting forge-scout"
      ${CMD_PREFIX} /opt/forge/forge-scout --api={{ api_url }} --mode="standalone" auto-detect > /var/log/forge/forge-scout.log 2>&1
  - path: /etc/bf.cfg
    permissions: '0644'
    content: |
      BOOT0=NET-OOB-IPV4-HTTP
      BOOT1=DISK
      BOOT2=NET-OOB.4040-IPV4
  - path: /var/lib/hbn/etc/supervisor/conf.d/acltool.conf
    content: |
      [program: cl-acltool]
      command = bash -c "sleep 5 && /usr/cumulus/bin/cl-acltool -i" ; wait for nl2docad to fully come online, revisit in hbn 1.4
      startsecs = 0
      autorestart = false
      priority = 200
  - path: /var/lib/hbn/etc/cumulus/acl/policy.d/10-dhcp.rules
    content: |
      [iptables]
      -t filter -A FORWARD -p udp -d 255.255.255.255 --dport 67 -m physdev --physdev-in pf0hpf_if -m comment --comment 'offload:0' -j DROP
      {% for vf_id in range(end=num_of_vfs|int) %}
      -t filter -A FORWARD -p udp -d 255.255.255.255 --dport 67 -m physdev --physdev-in pf0vf{{ vf_id }}_if -m comment --comment 'offload:0' -j DROP
      {% endfor %}

  - path: /etc/sysctl.d/98-hbn.conf
    permissions: '0644'
    content: |
      net.ipv6.conf.all.forwarding = 1
      kernel.shmmax = 4294967296
      vm.nr_hugepages=2048
      vm.min_free_kbytes=67584
  - path: /etc/forge/config.toml
    permissions: '0644'
    content: '[machine]'
  - path: /var/log/forge/forge-scout.log
    permissions: '0644'
    content: Not Started
  - path: /opt/forge/runcmds.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      function cleanup()
      {
          CMD_PREFIX="ip vrf exec mgmt"
          if [[ ! -f "/run/cloud-init.done" ]]
          then
            ${CMD_PREFIX} /opt/forge/forge-scout --api={{ api_url }} --mode="standalone" logerror
          else
            /bin/rm /run/cloud-init.done
          fi
      }
      function ensure_ethernet_link_type()
      {
          local log_file="/var/log/forge/link-type.log"
          mkdir -p /var/log/forge

          # Find the DPU config device before any management VRF setup depends on Ethernet.
          local mst_device
          mst_device="$(compgen -G '/dev/mst/mt*_pciconf0' | head -n 1)"
          if [[ -z "${mst_device}" ]]
          then
            echo "No mst pciconf device found for LINK_TYPE normalization" | tee -a "${log_file}"
            return
          fi

          # Non-VPI hardware may not expose LINK_TYPE, so treat query failures as non-fatal.
          local link_config
          if ! link_config="$(/usr/bin/mlxconfig -d "${mst_device}" q 2>&1)"
          then
            echo "LINK_TYPE query unsupported; continuing" | tee -a "${log_file}"
            echo "${link_config}" | tee -a "${log_file}"
            return
          fi
          echo "${link_config}" >> "${log_file}"

          # Apply Ethernet mode only to exposed ports not already reporting Ethernet.
          local link_type_keys=()
          local link_type_key
          local link_type_value
          for link_type_key in LINK_TYPE_P1 LINK_TYPE_P2
          do
            link_type_value="$(printf '%s\n' "${link_config}" | awk -v key="${link_type_key}" '$1 == key { print $2; exit }')"
            if [[ -n "${link_type_value}" && "${link_type_value}" != *"(2)"* ]]
            then
              link_type_keys+=("${link_type_key}")
            fi
          done

          local link_type_changed=0
          for link_type_key in "${link_type_keys[@]}"
          do
            echo "Normalizing ${link_type_key} to Ethernet" | tee -a "${log_file}"
            if /usr/bin/mlxconfig -y -d "${mst_device}" set "${link_type_key}=2"
            then
              link_type_changed=1
            else
              echo "Failed to normalize ${link_type_key}; continuing" | tee -a "${log_file}"
            fi
          done

          if [[ "${link_type_changed}" == "1" ]]
          then
            trap - EXIT
            reboot
            # Keep cloud-init incomplete; the controller restart path will re-enter PXE with the persisted LINK_TYPE setting.
            exit 1
          fi
      }
      trap cleanup EXIT
      set -e
      date -s '@{{ seconds_since_epoch }}'
      hwclock --systohc
      /usr/bin/bfrec --capsule /lib/firmware/mellanox/boot/capsule/efi_sbkeysync.cap || true
      ensure_ethernet_link_type
      /usr/bin/bfcfg
      ip vrf exec mgmt curl --retry 5 --retry-all-errors -v -o /opt/forge/forge_root.pem {{ pxe_url }}/api/v0/tls/root_ca
      echo "downloaded forge root cert"
      /usr/bin/mlxprivhost -d /dev/mst/mt*_pciconf0 r --disable_rshim --disable_tracer --disable_counter_rd --disable_port_owner
      bash -c '/usr/bin/mlxconfig -y -d /dev/mst/mt*_pciconf0 s SRIOV_EN=True NUM_OF_VFS={{ num_of_vfs }} HIDE_PORT2_PF=True NUM_OF_PF=1'
      bash -c '/usr/bin/mlxconfig -y -d /dev/mst/mt*_pciconf0 set LINK_TYPE_P1=2 LINK_TYPE_P2=2' || true # not all BF2s have VPI so ignore the error if it does not
      dpkg -i /opt/forge/forge-dpu.deb
      mkdir -p /etc/apt/sources.list.d
      bash -c 'echo "deb [trusted=yes] {{ pxe_url }}/public/blobs/internal/apt/ focal main" > /etc/apt/sources.list.d/forge.list'
      chmod +x /opt/forge/doca_container_configs/scripts/hbn-dpu-setup.sh
      cd /opt/forge/doca_container_configs/scripts/
      ip vrf exec mgmt /bin/bash hbn-dpu-setup.sh
      python3 /opt/dpf/patch-hbn-manifest.py
      ctr -n=k8s.io image import /opt/forge/doca_hbn.tar
      /opt/mellanox/doca/services/telemetry/import_doca_telemetry.sh


      {% if forge_vf_intercept_bridge_name %}
        
        # Create our new bridge
        ovs-vsctl --may-exist add-br {{ forge_vf_intercept_bridge_name }} -- set bridge {{ forge_vf_intercept_bridge_name }} datapath_type=netdev -- set interface {{ forge_vf_intercept_bridge_name }} mtu_request=9216

        {% if forge_vf_intercept_bridge_port %}

          # Grab the current port index of the hbn bridge and increment it
          next_br_hbn_ofport_index=$(($(ovs-vsctl get bridge br-hbn external_ids | grep -o '[0-9]*')+1))

          # Set the port index of the hbn bridge to the new index
          ovs-vsctl set bridge br-hbn external_ids:ofport_index=${next_br_hbn_ofport_index}

          # Add the hbn side of our patch port and set its ofport index to match what we set on the hbn bridge
          ovs-vsctl --may-exist add-port br-hbn {{ forge_vf_intercept_hbn_port }} -- set interface {{ forge_vf_intercept_hbn_port }} type=patch options:peer={{ forge_vf_intercept_bridge_port }} ofport_request="${next_br_hbn_ofport_index}"

          # Add our side of the patch to our new bridge
          ovs-vsctl --may-exist add-port {{ forge_vf_intercept_bridge_name }} {{ forge_vf_intercept_bridge_port }} -- set interface {{ forge_vf_intercept_bridge_port }} type=patch options:peer={{ forge_vf_intercept_hbn_port }}

          # Adjust the sfc.conf to insert our patch port where {{ forge_vf_intercept_bridge_sf }} used to be
          sed -i 's/br-hbn~{{ forge_vf_intercept_bridge_sf_representor }}~{{ forge_vf_intercept_bridge_sf_hbn_bridge_representor }}/br-hbn~{{ forge_vf_intercept_hbn_port }}~{{ forge_vf_intercept_bridge_sf_hbn_bridge_representor }}/' /etc/mellanox/sfc.conf

          # Match ofport and ofport_request match so that sfc.sh doesn't error out.
          ovs-vsctl set interface {{ forge_vf_intercept_bridge_port }} ofport_request=$(ovs-vsctl get interface {{ forge_vf_intercept_bridge_port }} ofport)

          # Clear the related link-propagation line.
          # We're going to delete the {{ forge_vf_intercept_bridge_sf_representor }}
          # so we don't need/want its link state to be propagated to {{ forge_vf_intercept_bridge_sf_hbn_bridge_representor }}
          sed -i ':a;N;$!ba;s/{{ forge_vf_intercept_bridge_sf_representor }}:{{ forge_vf_intercept_bridge_sf_hbn_bridge_representor }}\n*//' /etc/mellanox/sfc.conf

          # Now delete {{ forge_vf_intercept_bridge_sf_representor }} from br-hbn
          # OVS will get breaking flows if we leave it dangling. We either need to
          # move it to br-dpu or delete it, and we can delete it because we don't
          # need it.
          ovs-vsctl --if-exists del-port {{ forge_vf_intercept_bridge_sf_representor }}

        {% endif %}
      {% endif %}
      
      {% if forge_host_intercept_bridge_name %}
        
        # Create our new bridge
        ovs-vsctl --may-exist add-br {{ forge_host_intercept_bridge_name }} -- set bridge {{ forge_host_intercept_bridge_name }} datapath_type=netdev

        {% if forge_host_intercept_bridge_port %}

          # Grab the current port index of the hbn bridge and increment it
          next_br_hbn_ofport_index=$(($(ovs-vsctl get bridge br-hbn external_ids | grep -o '[0-9]*')+1))

          # Set the port index of the hbn bridge to the new index
          ovs-vsctl set bridge br-hbn external_ids:ofport_index=${next_br_hbn_ofport_index}

          # Add our patch port to br-hbn and set its ofport index to match what we set on the hbn bridge
          ovs-vsctl --may-exist add-port br-hbn {{ forge_host_intercept_hbn_port }} -- set interface {{ forge_host_intercept_hbn_port }} type=patch options:peer={{ forge_host_intercept_bridge_port }} ofport_request="${next_br_hbn_ofport_index}" external_ids='{dependencies=pf0hpf_if_r, hbn_netdev=pf0hpf_if, hbn_rep_ofport=pf0hpf_if_r}'

          # Add our side of the patch to our new bridge
          ovs-vsctl --may-exist add-port {{ forge_host_intercept_bridge_name }} {{ forge_host_intercept_bridge_port }} -- set interface {{ forge_host_intercept_bridge_port }} type=patch options:peer={{ forge_host_intercept_hbn_port }}

          # Match ofport and ofport_request match so that sfc.sh doesn't error out.
          ovs-vsctl set interface {{ forge_host_intercept_bridge_port }} ofport_request=$(ovs-vsctl get interface {{ forge_host_intercept_bridge_port }} ofport)

          # Adjust the sfc.conf to insert our patch port where pf0hpf used to be
          sed -i 's/br-hbn~pf0hpf~pf0hpf_if_r~pf0hpf_if~pf0hpf_if_r/br-hbn~{{ forge_host_intercept_hbn_port }}~pf0hpf_if_r~pf0hpf_if~pf0hpf_if_r/' /etc/mellanox/sfc.conf

          # Now pop pf0hpf off of br-hbn and attach it to br-host
          ovs-vsctl --if-exists del-port pf0hpf -- \
            --may-exist add-port {{ forge_host_intercept_bridge_name }} pf0hpf -- \
            set interface pf0hpf type=dpdk mtu_request=9216 external_ids='{}'
          ovs-vsctl set interface pf0hpf ofport_request=$(ovs-vsctl get interface pf0hpf ofport)
        {% endif %}
      {% endif %}

      # Now restart sfc.  This might not be necessary since OVS restart seems
      # to trigger this because of a systemd dependency.
      /usr/sbin/service sfc restart

      # And restart ovs
      /usr/sbin/service openvswitch-switch restart

      /opt/forge/run-scout.sh
      touch /run/cloud-init.done
  - path: /etc/systemd/system/containerd@mgmt.service.d/zz-no-socks-proxy.conf
    permissions: '0644'
    content: |
        [Service]
        UnsetEnvironment=HTTP_PROXY HTTPS_PROXY NO_PROXY
  - path: /etc/udev/rules.d/99-vrf-flannel.rules
    permissions: '0644'
    content: |
        ACTION=="add", SUBSYSTEM=="net", KERNEL=="cni0", RUN+="/sbin/ip link set cni0 master mgmt"
        ACTION=="add", SUBSYSTEM=="net", KERNEL=="flannel.1", RUN+="/sbin/ip link set flannel.1 master mgmt"
  - path: /opt/dpf/patch-hbn-manifest.py
    permissions: '0755'
    content: |
        #!/usr/bin/env python3
        """Patch doca_hbn.yaml to fix init-sfs bugs. (hbn init container script)

        Fixes 1-3: init-sfs restart recovery
        The init-sfs script moves SF interfaces to the pod namespace before
        checking SFC journal completion. If the check fails, kubelet restarts
        the init container, but the script only polls the host namespace for
        interfaces that are now in the pod namespace, causing an infinite loop.
        1. journalctl --boot: only check current boot's journal
        2. Idempotent polling: fall back to pod namespace check
        3. Non-fatal move: tolerate already-migrated interfaces

        Fixes 4-5: mgmt.intf IP extraction
        The setup_eth0_in_mgmt_vrf() function extracted the pod IP from
        iptables NAT rules, which picks up all kube-proxy DNAT entries
        (not just HBN's port-8765 rule). It also read the subnet mask from
        the br-mgmt CNI config (/16), which is wrong when Flannel assigns
        the pod IP (/24). This produces a mangled mgmt.intf that causes
        ifreload to fail inside the HBN container.
        4. Read IP/gateway directly from pod eth0 and default route
        5. Make IPv6 address/gateway lines conditional (Flannel has no IPv6)

        Fix 6: NVUE config re-apply on HBN restart
        The forge-dpu-agent writes nvue_startup.yaml to the hostPath and
        calls `nv config apply` inside HBN only when the file content
        changes. After an HBN container restart, the applied NVUE state
        is lost (bgpd reverts to no, interfaces revert to defaults) but
        the file persists on the hostPath, so the agent sees no diff and
        skips re-application. Deleting the file in init-sfs forces the
        agent to re-write it and call `nv config apply` on the new
        container.
        6. Delete nvue_startup.yaml from hostPath during init-sfs
        """
        import re
        import sys

        path = sys.argv[1] if len(sys.argv) > 1 else \
            '/opt/forge/doca_container_configs/configs/doca_hbn.yaml'

        try:
            with open(path) as f:
                content = f.read()
        except FileNotFoundError:
            print(f"CARBIDE PATCH: {path} not found, skipping")
            sys.exit(0)

        original = content

        # Fix 1: only check current boot's journal
        content = content.replace(
            'journalctl -u sfc.service --no-pager',
            'journalctl -u sfc.service --no-pager -b'
        )

        # Fix 2: poll pod namespace as fallback (two spacing variants)
        POLL_FIX = (
            'intf_ready=$(chroot /host nsenter -t 1 -n ip -br link show dev'
            ' ${intf} 2>/dev/null | cut -d" " -f1); [ -z "$intf_ready" ] &&'
            ' intf_ready=$(ip -br link show dev ${intf} 2>/dev/null'
            ' | cut -d" " -f1)'
        )
        content = content.replace(
            'intf_ready=$(chroot /host nsenter -t 1 -n ip -br link show'
            ' dev ${intf} | cut -d" " -f1)',
            POLL_FIX
        )
        content = content.replace(
            'intf_ready=$(chroot /host nsenter -t 1 -n ip -br link show'
            ' dev ${intf} | cut -d " " -f1)',
            POLL_FIX
        )

        # Fix 3: non-fatal interface move
        content = content.replace(
            'chroot /host nsenter -t 1 -n /usr/sbin/ip link set'
            ' ${intf} netns ${NS}',
            'chroot /host nsenter -t 1 -n /usr/sbin/ip link set'
            ' ${intf} netns ${NS} 2>/dev/null ||'
            ' echo "Interface ${intf} already in pod namespace"'
        )

        # Fix 4: replace iptables-based IP/gateway extraction with direct
        # eth0 reading from the pod namespace. The old approach greps all
        # kube-proxy DNAT entries and reads the wrong subnet mask from the
        # br-mgmt CNI config.
        MGMT_INTF_FIX = [
            '# Read eth0 IP directly from the pod network namespace (init container',
            '# shares pod netns). The previous approach parsed iptables NAT rules to',
            '# find the pod IP, but kube-proxy populates those rules with DNAT entries',
            "# for every cluster service endpoint -- not just HBN's port-8765 rule --",
            '# causing multiple IPs to be concatenated into mgmt.intf. It also read',
            '# the subnet mask from the br-mgmt CNI config (/16), which is wrong when',
            '# Flannel assigns the pod IP (/24). Reading eth0 directly is correct',
            '# regardless of which CNI is active (br-mgmt on boot 1, Flannel on boot 2+).',
            "IP4=$(ip -4 addr show eth0 2>/dev/null | awk '/inet /{print $2; exit}')",
            "IP6=$(ip -6 addr show eth0 2>/dev/null | awk '/inet6 / && !/fe80/{print $2; exit}')",
            '',
            '# Get gateway from the pod default route. On fresh pod creation the CNI',
            '# installs a default route via the bridge IP (e.g. via 10.244.x.1 for',
            '# Flannel, via 10.88.0.1 for br-mgmt).',
            "GW_IP4=$(ip -4 route show default 2>/dev/null | awk '/via/{print $3; exit}')",
            "GW_IP6=$(ip -6 route show default 2>/dev/null | awk '/via/ && !/fe80/{print $3; exit}')",
            '',
            '# Fallback for HBN crash recovery: if the main HBN container ran and',
            '# FRR/BGP replaced the original CNI default route (shows as "default',
            '# nhid N proto bgp" with no "via"), derive the gateway as the first',
            '# usable IP in the pod subnet (network_address + 1).',
            'if [ -z "$GW_IP4" ] && [ -n "$IP4" ]; then',
            "    IFS='/' read -r _addr _mask <<< \"$IP4\"",
            "    IFS='.' read -r _a _b _c _d <<< \"$_addr\"",
            '    _ipint=$(( (_a<<24) + (_b<<16) + (_c<<8) + _d ))',
            '    _maskint=$(( 0xFFFFFFFF << (32-_mask) & 0xFFFFFFFF ))',
            '    _gwint=$(( (_ipint & _maskint) + 1 ))',
            '    GW_IP4="$(( (_gwint>>24)&0xFF )).$(( (_gwint>>16)&0xFF )).$(( (_gwint>>8)&0xFF )).$(( _gwint&0xFF ))"',
            'fi',
        ]
        ip_match = re.search(r'^([ \t]*)# Read CNI file', content, re.MULTILINE)
        if ip_match:
            indent = ip_match.group(1)
            new_code = '\n'.join(
                (indent + line if line else '')
                for line in MGMT_INTF_FIX
            )
            content = re.sub(
                r'^[ \t]*# Read CNI file[^\n]*\n'
                r'[ \t]*CNI_FILE=/etc/cni/net\.d/10-containerd-net-br-mgmt\.conflist'
                r'.*?'
                r'GW_IP6=\$\(echo \$GATEWAYS[^\n]+',
                new_code,
                content,
                flags=re.DOTALL | re.MULTILINE,
            )

        # Fix 5: make IPv6 address/gateway conditional in mgmt.intf generation.
        # Flannel does not assign IPv6, so writing empty address/gateway lines
        # produces invalid ifupdown2 config. Guard against double-application
        # since the old string is a substring of the new string.
        if '[ -n "$IP6" ] && echo "    address $IP6"' not in content:
            content = content.replace(
                'echo "    address $IP6" >> $ENIM',
                '[ -n "$IP6" ] && echo "    address $IP6" >> $ENIM'
            )
        if '[ -n "$GW_IP6" ] && echo "    gateway $GW_IP6"' not in content:
            content = content.replace(
                'echo "    gateway $GW_IP6" >> $ENIM',
                '[ -n "$GW_IP6" ] && echo "    gateway $GW_IP6" >> $ENIM'
            )

        # Fix 6: delete the NVUE config diff cache from the hostPath so the
        # forge-dpu-agent re-writes and re-applies it to the new container.
        NVUE_RM = (
            'rm -f /host/var/lib/hbn/var/support/nvue_startup.yaml\n'
        )
        if 'rm -f /host/var/lib/hbn/var/support/nvue_startup.yaml' not in content:
            content = content.replace(
                'setup_eth0_in_mgmt_vrf\n\n      sysctl',
                'setup_eth0_in_mgmt_vrf\n\n'
                '      # Force forge-dpu-agent to re-apply NVUE config to this\n'
                '      # new container (the agent skips nv-config-apply when its\n'
                '      # input file on the hostPath has not changed).\n'
                '      rm -f /host/var/lib/hbn/var/support/nvue_startup.yaml\n\n'
                '      sysctl'
            )

        if content == original:
            if ('journalctl -u sfc.service --no-pager -b' in content
                    and 'ip -4 addr show eth0' in content
                    and 'rm -f /host/var/lib/hbn/var/support/nvue_startup' in content):
                print(f"CARBIDE PATCH: {path} already patched")
                sys.exit(0)
            print(f"CARBIDE PATCH: WARNING - no patches applied to {path}")
            print("The manifest structure may have changed upstream.")
            sys.exit(1)

        with open(path, 'w') as f:
            f.write(content)
        print(f"CARBIDE PATCH: {path} patched successfully")
  - path: /opt/dpf/remove-90-kubelet-bluefield.sh
    permissions: '0755'
    content: |
        #!/bin/bash
        file_path="/usr/lib/systemd/system/kubelet.service.d/90-kubelet-bluefield.conf"
        if [[ -f "$file_path" ]]; then
          cp -p "$file_path" "${file_path}.bak"
          rm "$file_path"
        fi
  - path: /opt/dpf/vrf-routes.sh
    permissions: '0755'
    content: |
        #!/bin/bash
        #
        # VRF Route Leaking for DPU Cluster Networking
        #
        # Problem: The DOCA BFB base image enslaves oob_net0 to the "mgmt" VRF,
        # which places all OOB routes in table 1001. hostNetwork pods (kube-proxy)
        # and pod-network processes running in the default VRF cannot reach the
        # Kubernetes API server or any external host because their lookups hit
        # the main table, which has no default route.
        #
        # Solution: Selectively leak routes from table 1001 (mgmt VRF) into the
        # default lookup chain so hostNetwork pods and flannel can function.
        # kubelet and containerd run in the mgmt VRF via kubelet@mgmt and
        # containerd@mgmt, so they do not need leaked routes.
        #
        set -euo pipefail

        modprobe br_netfilter

        # --- Default route (added first -- flannel needs this to start) ---
        GATEWAY=$(ip route show table 1001 | grep -oP 'default via \K[0-9.]+' | head -1)
        if [ -z "$GATEWAY" ]; then
            echo "ERROR: No default gateway in table 1001"
            exit 1
        fi
        if ! ip route show table main | grep -q "default via ${GATEWAY}.*metric 2000"; then
            ip route add default via "${GATEWAY}" dev oob_net0 table main metric 2000
            echo "Added default route in main table via ${GATEWAY} metric 2000"
        fi

        # --- API server route ---
        API_SERVER=$(grep -oP 'kubeadm join \K[0-9.]+' /opt/dpf/join_k8s_cluster.sh | head -1)
        if [ -z "$API_SERVER" ]; then
            echo "ERROR: Could not extract API server IP from /opt/dpf/join_k8s_cluster.sh"
            exit 1
        fi
        if ! ip rule show | grep -q "to ${API_SERVER} lookup 1001"; then
            ip rule add to "${API_SERVER}" lookup 1001
            echo "Added ip rule: to ${API_SERVER} lookup 1001"
        fi

        echo "VRF route leaking configured successfully"
  - path: /etc/systemd/system/dpf-vrf-routes.service
    permissions: '0644'
    content: |
        [Unit]
        Description=Leak mgmt VRF routes for DPU cluster networking
        After=network-online.target
        Before=kubeadm-join.service kubelet@mgmt.service
        Wants=network-online.target

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/opt/dpf/vrf-routes.sh

        [Install]
        WantedBy=multi-user.target
  - path: /opt/dpf/br-mgmt-routes.sh
    permissions: '0755'
    content: |
        #!/bin/bash
        # Best-effort br-mgmt route leaking.
        #
        # br-mgmt is the containerd default CNI bridge (10-containerd-net-br-mgmt.conflist),
        # enslaved to the mgmt VRF with subnet 10.88.0.0/16. On first boot (before the
        # Multus DaemonSet writes 00-multus.conf), br-mgmt is the only available CNI and
        # early pods get 10.88.0.x IPs via this bridge. The route rule
        # (to 10.88.0.0/16 lookup 1001) lets kube-proxy DNAT'd ClusterIP traffic cross
        # the VRF boundary to reach these pods.
        #
        # The gateway IP (10.88.0.1) is assigned by the CNI bridge plugin when the first
        # pod sandbox is created, which requires kubelet to be running. On reboot (when
        # 00-multus.conf already exists) or after the agent restarts containerd, br-mgmt
        # may never acquire an IP because no pods use it. In that case this script warns
        # and exits 0 -- it must not block the system.
        set -uo pipefail

        echo "Waiting for /opt/dpf/joined_cluster_successfully..."
        while [ ! -f /opt/dpf/joined_cluster_successfully ]; do
            sleep 5
        done

        echo "Waiting for br-mgmt interface and IPv4 address (best-effort)..."
        TRIES=0
        MAX_TRIES=120
        BR_MGMT_CIDR=""
        while [ -z "$BR_MGMT_CIDR" ]; do
            TRIES=$((TRIES + 1))
            if [ $TRIES -ge $MAX_TRIES ]; then
                echo "br-mgmt did not get an IPv4 address after ${MAX_TRIES} attempts (10 min). This is expected on reboot when Multus is already the default CNI."
                exit 0
            fi
            BR_MGMT_CIDR=$(ip -4 addr show br-mgmt 2>/dev/null | grep -oP 'inet \K[0-9./]+' | head -1 || true)
            [ -z "$BR_MGMT_CIDR" ] && sleep 5
        done
        if ! ip rule show | grep -q "to ${BR_MGMT_CIDR} lookup 1001"; then
            ip rule add to "${BR_MGMT_CIDR}" lookup 1001
            echo "Added ip rule: to ${BR_MGMT_CIDR} lookup 1001"
        fi
        echo "br-mgmt route configured successfully"
  - path: /etc/systemd/system/dpf-br-mgmt-routes.service
    permissions: '0644'
    content: |
        [Unit]
        Description=Best-effort br-mgmt CNI bridge route leaking
        After=network-online.target
        Wants=network-online.target

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/opt/dpf/br-mgmt-routes.sh

        [Install]
        WantedBy=multi-user.target
{% raw %}
  - path: /etc/systemd/system/kubelet.service.d/10-bf.conf
    permissions: '0644'
    content: |
        [Service]
        Environment="KUBELET_KUBECONFIG_ARGS=--bootstrap-kubeconfig=/etc/kubernetes/bootstrap-kubelet.conf --kubeconfig=/etc/kubernetes/kubelet.conf"
        Environment="KUBELET_CONFIG_ARGS=--config=/var/lib/kubelet/config.yaml"
        EnvironmentFile=-/var/lib/kubelet/kubeadm-flags.env
        EnvironmentFile=-/etc/default/kubelet
        ExecStart=
        ExecStart=/usr/bin/kubelet $KUBELET_KUBECONFIG_ARGS $KUBELET_CONFIG_ARGS $KUBELET_KUBEADM_ARGS $KUBELET_EXTRA_ARGS
  - path: /opt/dpf/join_k8s_cluster.sh
    permissions: '0755'
    content: |
        #!/bin/bash

        COMM_CH_BR_NAME={{if .OOBNetwork}}oob_net0{{else}}br-comm-ch{{end}}
        # update dynamic IP to kubelet configuration
        while true; do
            if [ -d "/sys/class/net/${COMM_CH_BR_NAME}" ]; then
                break
            fi
            sleep 5
        done
        while true; do
            ip_list=($(ip addr show ${COMM_CH_BR_NAME} | grep -oP 'inet \K[\d.]+'))

            if [[ ${#ip_list[@]} -lt 1 ]]; then
                sleep 5
                continue
            fi

            for ip in "${ip_list[@]}"; do
                echo "KUBELET_EXTRA_ARGS=--node-ip=${ip} --pod-manifest-path=/etc/kubelet.d" > /etc/default/kubelet
                systemctl enable kubelet@mgmt
                break
            done
            break
        done

        # already joined cluster
        if [ -e "/opt/dpf/joined_cluster_successfully" ]; then
            # avoid re-join when dpu restart
            echo "/opt/dpf/joined_cluster_successfully already exist, the node should already joined cluster."
            exit 0
        fi


        while true
        do
            {{.KubeadmJoinCMD}} && touch /opt/dpf/joined_cluster_successfully && exit 0
            sleep 5 # Wait for 5 seconds before retrying
            if [ -e "/etc/kubernetes/pki/ca.crt" ]; then
                rm -rf /etc/kubernetes/pki/ca.crt
            fi
            if [ -e "/etc/kubernetes/bootstrap-kubelet.conf" ]; then
                rm -rf /etc/kubernetes/bootstrap-kubelet.conf
            fi
        done
        echo "Failed joining k8s cluster after 30 minutes."
        exit 1
  - path: /etc/systemd/system/kubeadm-join.service
    permissions: '0644'
    content: |
        [Unit]
        Description=Run kubeadm until successful or timeout
        After=network-online.target
        Wants=network-online.target

        [Service]
        Type=simple
        ExecStart=/usr/bin/ip vrf exec mgmt /bin/bash /opt/dpf/join_k8s_cluster.sh


        [Install]
        WantedBy=multi-user.target
{% endraw %}

# run these commands (last)
runcmd:
  - [ hostnamectl, set-hostname, {% raw %}{{.DPUHostName}}{% endraw %} ]
  - [ /opt/dpf/remove-90-kubelet-bluefield.sh ]
  - [ systemctl, daemon-reload ]
  - [ /opt/mellanox/sfc-hbn/services_helper ]
  - [ systemctl, mask, kubelet.service ]
  - [ systemctl, enable, dpf-vrf-routes.service ]
  - [ systemctl, enable, dpf-br-mgmt-routes.service ]
  - [ systemctl, enable, kubeadm-join.service ]
  - [ bash, -c, '/opt/forge/runcmds.sh' ]
EOF

