// ─── Task Schedules ─────────────────────────────────────────────────────────

enum ScheduleSpecType {
    SCHEDULE_SPEC_TYPE_UNSPECIFIED = 0;
    SCHEDULE_SPEC_TYPE_INTERVAL    = 1;  // spec is a Go duration string, e.g. "24h"
    SCHEDULE_SPEC_TYPE_CRON        = 2;  // spec is a 5-field cron expression
    SCHEDULE_SPEC_TYPE_ONE_TIME    = 3;  // spec is an RFC3339 timestamp
}

message ScheduleSpec {
    ScheduleSpecType type     = 1;
    string           spec     = 2;
    // IANA timezone for interpreting cron specs (e.g. "America/New_York").
    // Defaults to "UTC". Ignored for interval and one-time specs.
    string           timezone = 3;
}

// OverlapPolicy controls what happens when a schedule fires while the previous
// execution for the same scope is still active.
enum OverlapPolicy {
    OVERLAP_POLICY_UNSPECIFIED = 0;
    OVERLAP_POLICY_SKIP        = 1;  // skip this firing cycle for any scope whose last task is still active
    OVERLAP_POLICY_QUEUE       = 2;  // submit unconditionally; the task manager queues behind the active task
}

// ScheduleConfig groups the scheduling fields shared by multiple request types.
message ScheduleConfig {
    string        name           = 1;
    ScheduleSpec  spec           = 2;
    OverlapPolicy overlap_policy = 3;
}

// TaskSchedule defines when (spec) and what (operation) should run automatically.
// Which racks to target is tracked separately in TaskScheduleScope rows and
// managed via AddTaskScheduleScope / RemoveTaskScheduleScope / ListTaskScheduleScopes.
message TaskSchedule {
    UUID                               id             = 1;
    string                             name           = 2;  // unique, human-readable identifier
    ScheduleSpec                       spec           = 3;  // when to fire (interval, cron, or one-time)
    OverlapPolicy                      overlap_policy = 4;
    bool                               enabled        = 5;  // false = paused (will not fire)
    optional google.protobuf.Timestamp next_run_at    = 6;  // absent for disabled or fully-fired one-time schedules
    optional google.protobuf.Timestamp last_run_at    = 7;  // absent if the schedule has never fired
    google.protobuf.Timestamp          created_at     = 8;
    google.protobuf.Timestamp          updated_at     = 9;
    // operation_type identifies the kind of operation this schedule runs.
    // Values: "POWER_ON", "POWER_OFF", "POWER_RESET", "BRING_UP", "INGEST",
    //         "UPGRADE_FIRMWARE", "DOWNGRADE_FIRMWARE", "ROLLBACK_FIRMWARE".
    string                             operation_type = 10;
    // description is a human-readable summary of the operation and its key parameters,
    // e.g. "Power Reset (forced)" or "Upgrade Firmware to v2.3.1".
    string                             description    = 11;
}

// ScheduledOperation is the shared operation oneof used by
// CreateTaskScheduleRequest and CheckScheduleConflictsRequest.
// Centralising it here means a single proto change adds support for a new
// operation type in both RPCs, and the Go conversion logic lives in one place.
//
// Note: the embedded request messages (e.g. PowerOnRackRequest) may carry a
// description field, but it is ignored when used inside a ScheduledOperation.
// The dispatcher generates task descriptions automatically at fire time in the
// form "<schedule name> — <RFC3339 timestamp>".
message ScheduledOperation {
    oneof operation {
        PowerOnRackRequest      power_on         = 1;
        PowerOffRackRequest     power_off        = 2;
        PowerResetRackRequest   power_reset      = 3;
        BringUpRackRequest      bring_up         = 4;
        UpgradeFirmwareRequest  upgrade_firmware = 5;
        IngestRackRequest       ingest           = 6;
    }
}

// CreateTaskScheduleRequest creates a new TaskSchedule.
// The target_spec on the operation message defines the initial scope; it follows
// the same targeting rules as AddTaskScheduleScope (rack-level or component-level).
// Use AddTaskScheduleScope / RemoveTaskScheduleScope to modify the scope after creation.
message CreateTaskScheduleRequest {
    ScheduleConfig     schedule  = 1;
    ScheduledOperation operation = 2;
}

message GetTaskScheduleRequest {
    UUID id = 1;
}

// ListTaskSchedulesRequest lists TaskSchedules with optional filters.
// Results are ordered by creation time ascending.
message ListTaskSchedulesRequest {
    optional UUID       rack_id      = 1;  // if set, return only schedules with a scope on this rack
    optional Pagination pagination   = 2;
    optional bool       enabled_only = 3;  // if true, return only enabled (non-paused) schedules
}

message ListTaskSchedulesResponse {
    repeated TaskSchedule task_schedules = 1;
    int32                 total          = 2;  // total matching count before pagination
}

// UpdateTaskScheduleRequest updates the scheduling config of an existing
// TaskSchedule. To modify which racks are targeted, use
// AddTaskScheduleScope / RemoveTaskScheduleScope instead.
//
// update_mask is required and controls which fields are written. Supported paths:
//   "schedule.name"           – display name
//   "schedule.overlap_policy" – overlap behaviour
//   "schedule.spec"           – full spec block (type + spec string + next_run_at recomputed)
//   "schedule.spec.timezone"  – timezone only (spec type/string unchanged)
message UpdateTaskScheduleRequest {
    UUID                      id          = 1;
    ScheduleConfig            schedule    = 2;
    google.protobuf.FieldMask update_mask = 3;
}

// PauseTaskScheduleRequest disables a TaskSchedule without deleting it.
// The schedule will not fire until resumed. Has no effect if already paused.
// Returns an error for a one-time schedule that has already fired.
message PauseTaskScheduleRequest {
    UUID id = 1;
}

// ResumeTaskScheduleRequest re-enables a paused TaskSchedule. For interval
// and cron schedules, next_run_at is recomputed from the current time so the
// schedule does not fire immediately. Has no effect if already enabled.
message ResumeTaskScheduleRequest {
    UUID id = 1;
}

// DeleteTaskScheduleRequest permanently deletes a TaskSchedule and all its
// scope entries. In-flight tasks are not cancelled.
message DeleteTaskScheduleRequest {
    UUID id = 1;
}

// TriggerTaskScheduleRequest fires a TaskSchedule immediately, regardless of
// next_run_at or enabled state. The overlap policy is not consulted — all
// scopes are submitted unconditionally. Returns an error for a one-time
// schedule that has already fired.
message TriggerTaskScheduleRequest {
    UUID id = 1;
}

// TaskScheduleScope represents one rack target in a schedule's scope.
// Each scope entry causes one task to be submitted per schedule firing.
// last_task_id tracks the task produced for this rack by the most recent firing;
// the dispatcher uses it for the overlap check. Absent if no task has fired yet
// for this scope (e.g. a newly added rack).
message TaskScheduleScope {
    UUID                      id           = 1;
    UUID                      schedule_id  = 2;
    UUID                      rack_id      = 3;
    // component_filter restricts which components in the rack are targeted.
    // Omit to target all components in the rack.
    oneof component_filter {
        // types filters by component type (e.g. COMPUTE, POWERSHELF).
        ComponentTypes   types      = 4;
        // components targets specific components by UUID or external reference.
        ComponentTargets components = 5;
    }
    UUID                      last_task_id = 6;  // absent until the first firing for this scope
    google.protobuf.Timestamp created_at   = 7;
}

// AddTaskScheduleScopeRequest adds one or more scope entries to a schedule.
// Supports rack-level targeting (with optional component-type filter) and
// component-level targeting (specific components by UUID or external reference).
// For component-level targets the server resolves which rack each component
// belongs to and groups them into per-rack scope entries automatically.
// Racks already present in the scope have their component filter merged with the
// incoming filter rather than erroring; racks not yet present are added.
// Existing racks are never removed — use UpdateTaskScheduleScope for replace semantics.
message AddTaskScheduleScopeRequest {
    UUID                schedule_id = 1;
    OperationTargetSpec target_spec = 2;
}

// AddTaskScheduleScopeResponse returns the newly created scope entries.
message AddTaskScheduleScopeResponse {
    repeated TaskScheduleScope scopes = 1;
}

// RemoveTaskScheduleScopeRequest removes a single rack scope entry by its scope ID.
// In-flight tasks for that rack are not cancelled.
message RemoveTaskScheduleScopeRequest {
    UUID scope_id = 1;
}

// UpdateTaskScheduleScopeRequest reconciles the schedule's scope against the
// desired target_spec: racks present in desired_scope but not in the current scope
// are added; racks present in the current scope but absent from desired_scope are
// removed; racks present in both have their component_filter updated if changed.
// For component-level targets the server resolves rack membership automatically.
message UpdateTaskScheduleScopeRequest {
    UUID                schedule_id   = 1;
    OperationTargetSpec desired_scope = 2;
}

// UpdateTaskScheduleScopeResponse returns the complete scope after reconciliation.
message UpdateTaskScheduleScopeResponse {
    repeated TaskScheduleScope scopes   = 1;
    int32                      added    = 2;  // number of scope entries added
    int32                      removed  = 3;  // number of scope entries removed
    int32                      updated  = 4;  // number of scope entries with updated component_filter
}

// ListTaskScheduleScopesRequest returns all scope entries for a given schedule.
message ListTaskScheduleScopesRequest {
    UUID schedule_id = 1;
}

message ListTaskScheduleScopesResponse {
    repeated TaskScheduleScope scopes = 1;
}

// CheckScheduleConflictsRequest checks whether a proposed scheduled operation
// would conflict with any existing enabled schedules.
// The operation oneof mirrors CreateTaskScheduleRequest: the target_spec
// embedded in the operation message defines which racks are checked.
//
// This call is advisory and intentionally coarse: it matches on operation
// type and code only, without intersecting component-type filters or explicit
// component UUID lists. As a result it may return false positives — two
// schedules that target disjoint component sets on the same rack will appear
// to conflict here even if their tasks would never collide at runtime.
// Execution-time conflict detection (the task manager's conflict rules) remains
// the authoritative backstop. The caller may proceed even when conflicts are
// returned.
message CheckScheduleConflictsRequest {
    ScheduledOperation operation           = 1;
    // exclude_schedule_id omits a schedule from the conflict check results.
    // Pass the ID of the schedule being updated so its current definition is
    // not returned as a conflict against the proposed replacement operation.
    optional UUID      exclude_schedule_id = 2;
}

// CheckScheduleConflictsResponse lists the existing enabled schedules whose
// operations may conflict with the proposed operation at execution time.
// An empty list means no conflicts were detected.
message CheckScheduleConflictsResponse {
    repeated TaskSchedule conflicts = 1;
}

// ─── Operation Runs ─────────────────────────────────────────────────────────

// CreateOperationRunRequest creates a durable rollout over a selected set of
// rack execution targets. The operation request's target_spec and target_scope,
// when present, define the candidate scope that selector is applied to. When
// omitted, the service builds the candidate scope from all qualified racks that
// are applicable to the operation.
message CreateOperationRunRequest {
    string name = 1;
    string description = 2;
    // Required. Reusable rollout configuration for target selection,
    // execution policy, and operation template.
    OperationRunConfiguration configuration = 3;
}

message CreateOperationRunResponse {
    UUID id = 1;
}

// OperationRunConfiguration is the create-time configuration that can be
// returned on detailed OperationRun responses.
message OperationRunConfiguration {
    OperationRunSelector selector = 1;
    OperationRunOptions options = 2;
    OperationRunOperation operation = 3;
}

message GetOperationRunRequest {
    UUID id = 1;
    // When true, Flow computes derived stats from operation_run_target rows
    // and returns OperationRun.stats.
    bool include_stats = 2;
}

message GetOperationRunResponse {
    OperationRun operation_run = 1;
}

// ListOperationRunsRequest lists operation runs, newest first by default.
message ListOperationRunsRequest {
    OperationRunFilter filter = 1;
    optional Pagination pagination = 2;
}

message ListOperationRunsResponse {
    repeated OperationRunSummary operation_runs = 1;
    int32 total = 2;
}

message OperationRunFilter {
    // Optional name query. Name is a human label and is not unique.
    StringQueryInfo name = 1;
    // Empty means all states. Each entry matches by AND-ing the fields set on
    // that entry; the entries compose with OR.
    repeated OperationRunStateFilter states = 2;
    // Empty means all operation kinds. A kind with no code matches all codes
    // for the operation type.
    repeated OperationKind operation_kinds = 3;
}

message OperationRunStateFilter {
    optional OperationRunStatus status = 1;
    optional OperationRunStatusReason reason = 2;
}

enum OperationRunTargetPhaseScope {
    OPERATION_RUN_TARGET_PHASE_SCOPE_UNKNOWN = 0;
    // Default. Targets in the latest materialized phase.
    OPERATION_RUN_TARGET_PHASE_SCOPE_CURRENT_PHASE = 1;
    // Targets in materialized phases before the current phase.
    OPERATION_RUN_TARGET_PHASE_SCOPE_COMPLETED_PHASES = 2;
    // All materialized targets through the current phase.
    OPERATION_RUN_TARGET_PHASE_SCOPE_CURRENT_AND_COMPLETED_PHASES = 3;
}

// ListOperationRunTargetsRequest lists materialized rack execution targets for
// one operation run. status UNKNOWN means no target-status filter is applied.
// phase_scope UNKNOWN defaults to CURRENT_PHASE.
message ListOperationRunTargetsRequest {
    UUID operation_run_id = 1;
    OperationRunTargetStatus status = 2;
    optional Pagination pagination = 3;
    OperationRunTargetPhaseScope phase_scope = 4;
}

message ListOperationRunTargetsResponse {
    repeated OperationRunTarget targets = 1;
    int32 total = 2;
}

message PauseOperationRunRequest {
    UUID id = 1;
}

message ResumeOperationRunRequest {
    UUID id = 1;
}

message CancelOperationRunRequest {
    UUID id = 1;
    string reason = 2;
}

message OperationRunSelector {
    oneof selector {
        PercentageSelector percentage = 1;
    }
}

message PercentageSelector {
    // Required. Valid range: 1..100.
    int32 percentage = 1;

    // Optional. If omitted, the service generates one and stores it so the
    // selected cohort is deterministic and auditable.
    string seed = 2;
}

message OperationRunOptions {
    // Required. Maximum number of operation-run targets that may have active
    // child tasks at the same time.
    int32 max_concurrent_targets = 1;

    // Required. Composable safety gates for the rollout.
    OperationRunSafetyPolicy safety_policy = 2;

    // Optional. If omitted or partially specified, the service stores and
    // returns the effective default policy for the operation type/code.
    OperationRunConflictPolicy conflict_policy = 3;

    // Optional. If omitted, the service stores and returns the default random
    // ordering policy with a generated seed.
    OperationRunOrderingPolicy ordering_policy = 4;

    // Optional. If omitted, the run has one phase containing all selected
    // rack execution targets.
    OperationRunPhasePolicy phase_policy = 5;
}

message OperationRunSafetyPolicy {
    // Gates compose with OR: the dispatcher pauses the run when any gate
    // crosses its configured threshold.
    repeated OperationRunSafetyGate gates = 1;
}

message OperationRunSafetyGate {
    oneof gate {
        OperationRunFailureRateGate failure_rate = 1;
        OperationRunFailureCountGate failure_count = 2;
    }
}

message OperationRunFailureRateGate {
    // Optional. Default: CURRENT_PHASE.
    OperationRunSafetyGateScope scope = 1;

    // Required. Valid range: 1..100. The dispatcher pauses when
    // failed_targets / planned_targets reaches this threshold for the scope.
    int32 failure_threshold_percent = 2;
}

message OperationRunFailureCountGate {
    // Optional. Default: CURRENT_PHASE.
    OperationRunSafetyGateScope scope = 1;

    // Required. The dispatcher pauses when failed_targets reaches this count
    // for the scope.
    int32 failure_threshold_count = 2;
}

enum OperationRunSafetyGateScope {
    OPERATION_RUN_SAFETY_GATE_SCOPE_UNKNOWN = 0;
    OPERATION_RUN_SAFETY_GATE_SCOPE_CURRENT_PHASE = 1;
    OPERATION_RUN_SAFETY_GATE_SCOPE_CUMULATIVE_RUN = 2;
}

message OperationRunOrderingPolicy {
    oneof ordering {
        OperationRunRandomOrdering random = 1;
        // Reserved for a later implementation. The first implementation keeps
        // this API branch but rejects it as unsupported.
        OperationRunPhysicalLocationOrdering physical_location = 3;
    }
}

message OperationRunRandomOrdering {
    // Optional. If omitted, the service generates one and stores it.
    string seed = 1;
}

message OperationRunPhysicalLocationOrdering {
    enum Strategy {
        STRATEGY_UNKNOWN = 0;
        STRATEGY_ROW_BY_ROW = 1;
        STRATEGY_ONE_PER_ROW_ROUND_ROBIN = 2;
    }

    Strategy strategy = 1;
}

message OperationRunPhasePolicy {
    oneof plan {
        EqualOperationRunPhases equal = 1;
        PercentageOperationRunPhases percentage = 2;
        CountOperationRunPhases count = 3;
    }

    // Optional. Default: manual phase advancement.
    OperationRunPhaseAdvancePolicy advance_policy = 4;
}

message EqualOperationRunPhases {
    // Required. Example: 10 means ten roughly equal phases.
    int32 phase_count = 1;
}

message PercentageOperationRunPhases {
    repeated OperationRunPercentagePhase phases = 1;
}

message OperationRunPercentagePhase {
    // Required. Valid range: 1..100. Percentage phase values must sum to 100.
    int32 percentage = 1;
}

message CountOperationRunPhases {
    // Counts for phases before the generated final phase. The generated final
    // phase covers the remaining candidate scope after all targets assigned by
    // these defined count phases.
    repeated OperationRunCountPhase phases = 1;
}

message OperationRunCountPhase {
    // Required. Must be greater than 0.
    int32 count = 1;
}

message OperationRunPhaseAdvancePolicy {
    // When false, a completed phase pauses with PHASE_GATE and waits for
    // ResumeOperationRun. When true, the dispatcher advances to the next phase
    // automatically as long as global safety gates are not tripped.
    bool auto_advance = 1;
}

message OperationRunConflictPolicy {
    oneof strategy {
        OperationRunConflictRetryPolicy retry = 1;
    }
}

message OperationRunConflictRetryPolicy {
    // Optional. Missing values are filled from operation-specific defaults.
    google.protobuf.Duration retry_timeout = 1;
    google.protobuf.Duration initial_retry_delay = 2;
    google.protobuf.Duration max_retry_delay = 3;
}

enum OperationRunInclusiveScopeComposition {
    OPERATION_RUN_INCLUSIVE_SCOPE_COMPOSITION_UNKNOWN = 0;
    // Default. If target_spec and prior-run targets are both inclusive sources,
    // candidates must be present in both sources. In set terms: T AND R.
    OPERATION_RUN_INCLUSIVE_SCOPE_COMPOSITION_INTERSECT = 1;
    // If target_spec and prior-run targets are both inclusive sources,
    // candidates may be present in either source. In set terms: T OR R.
    OPERATION_RUN_INCLUSIVE_SCOPE_COMPOSITION_UNION = 2;
}

message OperationRunTargetScope {
    // When false, an operation target_spec is an inclusive source. When true,
    // the service builds the default qualified/applicable scope and removes
    // the resolved operation target_spec before applying the selector. True
    // requires the embedded operation request to include target_spec.
    bool exclude_target_spec = 1;

    // Prior operation runs whose materialized rack execution targets contribute to
    // this run's candidate scope. Targets from repeated run IDs are unioned
    // into one prior-run target source before composition or subtraction.
    repeated UUID operation_run_ids = 2;

    // When false, operation_run_ids are an inclusive source. When true, the
    // prior-run target source is subtracted from the candidate scope. True
    // requires operation_run_ids to be non-empty.
    bool exclude_operation_run_targets = 3;

    // Controls only how multiple inclusive sources are combined. It is ignored
    // when there are zero or one inclusive sources. Exclusion sources are never
    // affected by this field; they are always subtracted after inclusive scope
    // composition. UNKNOWN defaults to INTERSECT.
    OperationRunInclusiveScopeComposition inclusive_scope_composition = 4;
}

message OperationRunOperation {
    oneof operation {
        // In CreateOperationRun, target_spec is optional and defines candidate
        // scope before selector is applied. In the existing UpgradeFirmware RPC,
        // target_spec remains required and means "run exactly on these targets".
        UpgradeFirmwareRequest upgrade_firmware = 1;
    }

    // Optional scope composition controls for the embedded operation request.
    // If omitted, target_spec is inclusive, prior-run targets are not used, and
    // inclusive source composition defaults to INTERSECT.
    OperationRunTargetScope target_scope = 2;
}

enum OperationRunStatus {
    OPERATION_RUN_STATUS_UNKNOWN = 0;
    OPERATION_RUN_STATUS_PENDING = 1;
    OPERATION_RUN_STATUS_RUNNING = 2;
    OPERATION_RUN_STATUS_PAUSED = 3;
    OPERATION_RUN_STATUS_COMPLETED = 4;
    OPERATION_RUN_STATUS_CANCELLED = 5;
    OPERATION_RUN_STATUS_FAILED = 6;
}

enum OperationRunStatusReason {
    OPERATION_RUN_STATUS_REASON_UNKNOWN = 0;
    OPERATION_RUN_STATUS_REASON_NONE = 1;
    OPERATION_RUN_STATUS_REASON_OPERATOR_PAUSED = 2;
    OPERATION_RUN_STATUS_REASON_PHASE_GATE = 3;
    OPERATION_RUN_STATUS_REASON_SAFETY_GATE = 4;
    OPERATION_RUN_STATUS_REASON_CONFLICT_RETRY_TIMEOUT = 5;
}

message OperationRunState {
    OperationRunStatus status = 1;
    OperationRunStatusReason reason = 2;
}

message OperationKind {
    OperationType type = 1;
    optional string code = 2;
}

message OperationRun {
    OperationRunSummary summary = 1;
    OperationRunConfiguration configuration = 2;
    // Present only when the request asks Flow to compute derived stats.
    OperationRunStats stats = 3;
}

// OperationRunSummary is the lightweight representation returned by
// ListOperationRuns. It intentionally omits the full configuration and
// target-derived phase stats; callers can use GetOperationRun for those details.
message OperationRunSummary {
    UUID id = 1;
    string name = 2;
    string description = 3;
    OperationKind operation_kind = 4;
    OperationRunState state = 5;
    string status_message = 6;
    int32 total_phases = 7;
    google.protobuf.Timestamp created_at = 8;
    google.protobuf.Timestamp updated_at = 9;
    optional google.protobuf.Timestamp started_at = 10;
    optional google.protobuf.Timestamp finished_at = 11;
}

message OperationRunStats {
    OperationRunPhaseStats current_phase_stats = 1;
    OperationRunPhaseStats cumulative_phase_stats = 2;
}

message OperationRunPhaseStats {
    // For current_phase_stats, this is the current phase index. For
    // cumulative_phase_stats, this is the latest included phase index.
    int32 phase_index = 1;
    int32 selected_targets = 2;
    OperationRunTargetOutcomeCounts outcome_counts = 3;
}

message OperationRunTargetOutcomeCounts {
    int32 completed = 1;
    int32 failed = 2;
    int32 terminated = 3;
    int32 skipped = 4;
}

enum OperationRunTargetStatus {
    OPERATION_RUN_TARGET_STATUS_UNKNOWN = 0;
    OPERATION_RUN_TARGET_STATUS_PENDING = 1;
    OPERATION_RUN_TARGET_STATUS_BLOCKED = 2;
    OPERATION_RUN_TARGET_STATUS_SUBMITTED = 3;
    OPERATION_RUN_TARGET_STATUS_COMPLETED = 4;
    OPERATION_RUN_TARGET_STATUS_FAILED = 5;
    OPERATION_RUN_TARGET_STATUS_TERMINATED = 6;
    OPERATION_RUN_TARGET_STATUS_SKIPPED = 7;
}

message OperationRunTarget {
    UUID id = 1;
    UUID operation_run_id = 2;
    UUID rack_id = 3;
    int32 sequence_index = 4;
    int32 phase_index = 5;
    UUID task_id = 6;  // absent until a child task has been submitted
    OperationRunTargetStatus status = 7;
    string message = 8;
    oneof component_filter {
        ComponentTypes types = 9;
        ComponentTargets components = 10;
    }
    google.protobuf.Timestamp created_at = 11;
    google.protobuf.Timestamp updated_at = 12;
}
