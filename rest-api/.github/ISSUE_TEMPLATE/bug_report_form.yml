name: Bug Report
description: File a bug report
title: "bug: "
labels: ["bug"]
type: Bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of NVIDIA Infra Controller REST are you running?
      placeholder: "example: 1.0.6"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug.
      description: Also tell us, what did you expect to happen?
      placeholder: XYZ occured, I expected QRS results
    validations:
      required: true

  - type: textarea
    id: mvr
    attributes:
      label: Minimum reproducible example
      description: Please supply a [minimum reproducible code example](https://matthewrocklin.com/blog/work/2018/02/28/minimal-bug-reports) here
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please paste relevant error and log output here
      render: shell

  - type: textarea
    id: misc
    attributes:
      label: Other/Misc.
      description: Please enter any other helpful information here.

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/NVIDIA/infra-controller/rest-api/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow NVIDIA Infra Controller's Code of Conduct
          required: true
        - label: I have searched the [open bugs](https://github.com/NVIDIA/infra-controller/rest-api/issues?q=is%3Aopen+is%3Aissue+type:Bug) and have found no duplicates for this bug report
          required: true
