name: Documentation - New Documentation Request
description: Request additions to NVIDIA Infra Controller REST documentation
title: "docs: "
labels: ["doc"]
type: Documentation

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to improve our documentation!

  - type: dropdown
    id: criticality
    attributes:
      label: How would you describe the priority of this documentation request
      options:
        - Critical (currently preventing usage)
        - High
        - Medium
        - Low (would be nice)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Describe the future/missing documentation
      placeholder: A code snippet mentions function foo(args) but I cannot find any documentation on it.
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/NVIDIA/infra-controller/rest-api/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow NVIDIA Infra Controller's Code of Conduct
          required: true
        - label: I have searched the [open documentation issues](https://github.com/NVIDIA/infra-controller/rest-api/issues?q=is%3Aopen+is%3Aissue+type:Documentation) and have found no duplicates for this documentation issue
          required: true
