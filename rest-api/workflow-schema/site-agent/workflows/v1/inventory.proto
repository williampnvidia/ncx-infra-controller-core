syntax = "proto3";

package workflows.v1;

import "google/protobuf/timestamp.proto";

import "common_nico.proto";
import "nico_nico.proto";
import "machine_discovery_nico.proto";

option go_package = "github.com/NVIDIA/infra-controller/rest-api/workflow-schema/proto";

// InventoryStatus - response status for inventory collection
enum InventoryStatus {
  INVENTORY_STATUS_UNSPECIFIED = 0;
  INVENTORY_STATUS_SUCCESS = 1;
  INVENTORY_STATUS_FAILED = 2;
}

// InventoryPage - pagination information about inventory
message InventoryPage {
  // Total number of pages
  int32 total_pages = 1;
  // Current page number
  int32 current_page = 2;
  // Number of items per page
  int32 page_size = 3;
  // Total number of items
  int32 total_items = 4;
  // IDs of all items
  repeated string item_ids = 5;
}

// DpuExtensionServiceInventory - inventory of all DPU Extension Services on Site, collected periodically
message DpuExtensionServiceInventory {
  // Status of Inventory
  InventoryStatus inventory_status = 1;
  // Status message
  string status_msg = 2;
  // Reported timestamp of DpuExtensionService inventory
  google.protobuf.Timestamp timestamp = 3;
  // List of DpuExtensionServices
  repeated forge.DpuExtensionService dpu_extension_services = 4;
  // Inventory page information
  InventoryPage inventory_page = 5;
}

// ExpectedMachineInventory - inventory info of all Expected Machines on Site, collected periodically
message ExpectedMachineInventory {
  // Status of Inventory
  InventoryStatus inventory_status = 1;
  // Status message
  string status_msg = 2;
  // Reported timestamp of Expected Machine inventory
  google.protobuf.Timestamp timestamp = 3;
  // List of Expected Machine Partition
  repeated forge.ExpectedMachine expected_machines = 4;
  // Inventory page information
  InventoryPage inventory_page = 5;
  // Linked Expected Machines (contains Machine ID)
  repeated forge.LinkedExpectedMachine linked_machines = 6;
}

