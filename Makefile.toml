[tasks.pxe-docker-x86]
category = "Build"
description = "Build x86_64 PXE boot artifacts inside a privileged container. Requires build-pxe-build-container first. Artifacts land in pxe/static/blobs/internal/x86_64/ via the repo mount."
workspace = false
script = '''
set -e
if [ -z "$CARGO_HOME" ]; then CARGO_HOME="$HOME/.cargo"; fi
SCCACHE_HOST="${SCCACHE_DIR:-$HOME/.sccache}"
mkdir -p "$SCCACHE_HOST"
HOST_UID=$(id -u)
HOST_GID=$(id -g)
PKG_VERSION=$(git -C "${REPO_ROOT}" describe --tags --first-parent --always --long 2>/dev/null | sed 's/^v//')
case "${PKG_VERSION}" in
  [0-9]*) ;;
  *) PKG_VERSION="0.0.0-${PKG_VERSION}" ;;
esac
docker run --rm \
  --privileged \
  -v "${REPO_ROOT}":/code \
  -v "${CARGO_HOME}":/cargo \
  -v "${SCCACHE_HOST}":/sccache \
  -w /code \
  -e CARGO_HOME=/cargo \
  -e SCCACHE_DIR=/sccache \
  -e SA_ENABLEMENT=1 \
  -e PKG_VERSION="${PKG_VERSION}" \
  -e HOST_UID="${HOST_UID}" \
  -e HOST_GID="${HOST_GID}" \
  carbide-pxe-builder \
  sh -c 'git config --global --add safe.directory /code && git config --global --add safe.directory /code/pxe/ipxe/upstream && r=0; cargo make --cwd pxe --env PKG_VERSION=${PKG_VERSION} --env SA_ENABLEMENT=1 build-boot-artifacts-x86-host-sa || r=$?; chown -R ${HOST_UID}:${HOST_GID} /code 2>/dev/null || true; exit $r'
'''

[tasks.pxe-native-x86]
category = "Build"
description = "Build x86_64 PXE boot artifacts natively on the host/runner. All deps must be pre-installed (CI: use setup-mkosi-environment action). Artifacts land in pxe/static/blobs/internal/x86_64/."
workspace = false
script = '''
set -e
cargo make --cwd pxe --env SA_ENABLEMENT=1 build-boot-artifacts-x86-host-sa
'''

[tasks.cargo-docker]
category = "Build"
description = "Run Cargo inside the carbide-build-x86_64 Docker container. Requires build-cargo-docker-image first (slow on Apple Silicon). Pass cargo args after -- without extra quotes."
workspace = false
dependencies = ["check-cargo-home-set"]
script = '''
set -e
if [ -z "$CARGO_HOME" ]; then CARGO_HOME="$HOME/.cargo"; fi
CARGO_ARGS="${CARGO_MAKE_TASK_ARGS:-build -p nico-admin-cli --release}"
CARGO_ARGS="${CARGO_ARGS//;/ }"
CARGO_ARGS="${CARGO_ARGS#-- }"
docker run --rm \
  -v "${REPO_ROOT}":/code \
  -v "${CARGO_HOME}":/cargo \
  -w /code \
  -u $(id -u):$(id -g) \
  -e CARGO_HOME=/cargo \
  carbide-build-x86_64 \
  cargo ${CARGO_ARGS}
'''

[tasks.fix-target-permissions]
category = "Build"
description = "Fix ownership of target/ (and repo root if needed) so cargo-docker-minimal can write. Run once if you see 'Permission denied' writing to /code/target. Uses sudo."
workspace = false
script = '''
set -e
cd "${REPO_ROOT}"
if [ -d target ]; then
  sudo chown -R $(id -u):$(id -g) target
  echo "Fixed target/ ownership."
else
  sudo chown -R $(id -u):$(id -g) .
  echo "Fixed repo ownership (no target/ yet)."
fi
'''

[tasks.cargo-docker-minimal]
category = "Build"
description = "Run Cargo in minimal Linux image (Rust 1.96 + protoc). Requires build-cargo-docker-image-minimal once (~2-5 min). For DB tests set DATABASE_URL (use host.docker.internal, not localhost). Runs as root and chowns /code afterward so target/ stays writable on macOS/Colima."
workspace = false
dependencies = ["check-cargo-home-set"]
script = '''
set -e
if [ -z "$CARGO_HOME" ]; then CARGO_HOME="$HOME/.cargo"; fi
# cargo-make may join task args with semicolons; normalize to spaces and strip leading --
CARGO_ARGS="${CARGO_MAKE_TASK_ARGS:-build -p nico-admin-cli --release}"
CARGO_ARGS="${CARGO_ARGS//;/ }"
CARGO_ARGS="${CARGO_ARGS#-- }"
# Pass DATABASE_URL into container so DB tests can connect (use host.docker.internal from Mac)
DOCKER_EXTRA=
[ -n "$DATABASE_URL" ] && DOCKER_EXTRA="-e DATABASE_URL=$DATABASE_URL"
# Persistent sccache so repeat cargo test/build are much faster (optional: set SCCACHE_DIR on host)
SCCACHE_HOST="${SCCACHE_DIR:-$HOME/.sccache}"
mkdir -p "$SCCACHE_HOST"
# Allow container to reach host (e.g. Postgres); needed on Colima, harmless on Docker Desktop
# Run as root and chown /code afterward so target/ is always writable on the host (avoids
# recurring "Permission denied" with Colima/virtiofs UID mapping on macOS).
HOST_UID=$(id -u)
HOST_GID=$(id -g)
docker run --rm \
  --add-host=host.docker.internal:host-gateway \
  -v "${REPO_ROOT}":/code \
  -v "${CARGO_HOME}":/cargo \
  -v "${SCCACHE_HOST}":/sccache \
  -w /code \
  -e CARGO_HOME=/cargo \
  -e SCCACHE_DIR=/sccache \
  -e HOST_UID="${HOST_UID}" \
  -e HOST_GID="${HOST_GID}" \
  $DOCKER_EXTRA \
  carbide-build-minimal \
  sh -c 'r=0; cargo "$@" || r=$?; chown -R ${HOST_UID}:${HOST_GID} /code 2>/dev/null || true; exit $r' sh ${CARGO_ARGS}
'''

