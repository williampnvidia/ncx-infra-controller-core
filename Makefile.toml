]

[tasks.check-aarch64-release-container-services-page-size]
workspace = false
script = '''
set -e

for artifact in \
  carbide-api \
  carbide \
  carbide-dns \
  nico-admin-cli \
  carbide-dsx-exchange-consumer \
  forge-dpu-agent \
  forge-dhcp-server \
  forge-hw-health \
  forge-log-parser \
  ssh-console \
  carbide-bmc-proxy \
  libdhcp.so; do
  for path in \
    "${REPO_ROOT}/target/aarch64-unknown-linux-gnu/release/${artifact}" \
    "${REPO_ROOT}/target/release/${artifact}"; do
    bash "${REPO_ROOT}/scripts/check-aarch64-pagesize.sh" --allow-empty "${path}"
  done
done
'''

[tasks.build-release-container-services]
workspace = false
dependencies = [
  "build-release",
  "check-aarch64-release-container-services-page-size",
]

[tasks.test-release-container-services]
workspace = false
dependencies = [
  "test-flow",
]

[tasks.build-and-test-release-container-services]
workspace = false
# Important: We only build perform a single build task here since every additional
# build has a high change to also rebuild all dependencies due to different feature
# combinations.
# No new build tasks for single binaries should be added for this task which is
# called by CI. If necessary separate tasks can be defined for workflows which
# do not require everything.
dependencies = [
  "build-release", # Start with release builds, since some artifacts are used in integration tests
  "test-flow",     # Then run all tests
  "check-aarch64-release-container-services-page-size",
]

